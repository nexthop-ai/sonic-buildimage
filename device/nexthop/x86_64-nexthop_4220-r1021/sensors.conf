# libsensors configuration file
# ----------------------------------------------
chip "k10temp-pci-*"
    label temp1 "CPU"

chip "nvme-pci-*"
    ignore temp2
    ignore temp3
    ignore temp4

chip "tmp464-*"
    label temp1 "Switch Card Lower Rear"
    label temp2 "PSU 2 Intake"
    label temp3 "ASIC Diode 0"
    label temp4 "ASIC Diode 1"
    label temp5 "ASIC Diode 2"
    set temp1_max 87
    set temp1_crit 95
    set temp2_max 55
    set temp2_crit 125
    set temp3_max 115
    set temp3_crit 125
    set temp4_max 115
    set temp4_crit 125
    set temp5_max 115
    set temp5_crit 125
    ignore temp6
    ignore temp7
    ignore temp8
    ignore temp9

chip "tmp451-*"
    ignore temp1
    label temp2 "Chassis Intake"
    set temp2_max 45
    set temp2_crit 125

chip "xdpe1a2g5b-*"
    set temp1_max 120
    set temp1_crit 130

chip "raa228234-*"
    set temp1_max 120
    set temp1_crit 130

chip "raa228236-*"
    compute in3 @*(1.2), @/(1.2)
    set temp1_max 120
    set temp1_crit 130

chip "spd5118-*"
    set temp1_max 85
    set temp1_crit 95
