# libsensors configuration file
# ----------------------------------------------
bus "i2c-168" "i2c-100-mux (chan_id 1)"
bus "i2c-172" "i2c-101-mux (chan_id 1)"

chip "k10temp-pci-*"
    label temp1 "CPU"

chip "nvme-pci-*"
    ignore temp2
    ignore temp3
    ignore temp4

chip "tmp464-*"
    label temp1 "Switch Card Rear"
    label temp2 "Chassis Intake"
    label temp3 "ASIC Diode 0"
    label temp4 "ASIC Diode 1"
    label temp5 "ASIC Diode 2"
    set temp1_max 87
    set temp1_crit 125
    set temp2_max 55
    set temp2_crit 125
    set temp3_max 115
    set temp3_crit 122
    set temp4_max 115
    set temp4_crit 122
    set temp5_max 115
    set temp5_crit 122
    ignore temp6
    ignore temp7
    ignore temp8
    ignore temp9

chip "xdpe1a2g5b-*"
    set temp1_max 120
    set temp1_crit 130

chip "nh_raa228244-*"
    set temp1_max 120
    set temp1_crit 130

chip "nh_raa228244-i2c-*-72"
    compute in3 @*(1.2), @/(1.2)

chip "nh_raa228244-i2c-168-62"
    compute in3 @*(1.2), @/(1.2)
    compute in4 @*(1.2), @/(1.2)

chip "nh_raa228244-i2c-172-62"
    compute in3 @*(1.2), @/(1.2)
    compute in4 @*(1.2), @/(1.2)
