# libsensors configuration file 
# ----------------------------------------------
#
bus "i2c-24" "i2c-pci-24"

chip "nh_tmp464-*"
    label temp2 "Front"
    label temp3 "Back"
    label temp4 "ASIC Diode 0"
    label temp5 "ASIC Diode 1"

    # Crit/max are swapped because tempX_max triggers OT shutdown
    ignore temp1
    set temp2_crit 87
    set temp2_max 95
    set temp3_crit 87
    set temp3_max 95
    set temp4_crit 115
    set temp4_max 125
    set temp5_crit 115
    set temp5_max 125
    ignore temp6
    ignore temp7
    ignore temp8
    ignore temp9

# Note: k10temp driver does not support writing max/crit values, so we rely on
# pddf-device.json to provide the values instead.
chip "k10temp-pci-*"
    label temp1 "CPU"

# The NVME drive doesn't populate min and max temps for these sensors, ignore
# them to not get I/O errors.
chip "nvme-pci-*"
    ignore temp2
    ignore temp3
    ignore temp4

chip "nh_isl68225-i2c-24-64"
    compute in3 @*(1.2), @/(1.2)

chip "nh_isl68225-i2c-24-66"
    compute in3 @*(1.2), @/(1.2)

chip "xdpe1a2g5b-*"
    set temp1_max 100
    set temp1_crit 145

chip "nh_isl68225-*"
    set temp1_max 115
    set temp1_crit 125
    set temp2_max 115
    set temp2_crit 125
