# libsensors configuration file
# ----------------------------------------------
chip "k10temp-pci-*"
    label temp1 "CPU"

chip "nvme-pci-*"
    ignore temp2
    ignore temp3
    ignore temp4

chip "nh_tmp464-*"
    ignore temp1
    label temp2 "Front"
    label temp3 "Back"
    label temp4 "ASIC Diode 0"
    label temp5 "ASIC Diode 1"
    set temp2_max 95
    set temp2_crit 87
    set temp3_max 95
    set temp3_crit 87
    set temp4_max 125
    set temp4_crit 115
    set temp5_max 125
    set temp5_crit 115
    ignore temp6
    ignore temp7
    ignore temp8
    ignore temp9

chip "xdpe1a2g5b-*"
    set temp1_max 100
    set temp1_crit 145

chip "nh_isl68225-*"
    set temp1_max 115
    set temp1_crit 125
    set temp2_max 115
    set temp2_crit 125

chip "nh_isl68225-i2c-*-64" "nh_isl68225-i2c-*-66"
    compute in3 @*(1.2), @/(1.2)
